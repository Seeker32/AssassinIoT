http:
  enabled: true
  address: 0.0.0.0:4195

logger:
  level: ${BENTO_LOG_LEVEL:DEBUG}
  format: logfmt
  add_timestamp: true
  static_fields:
    '@service': data-receiver

metrics:
  prometheus:
    use_histogram_timing: true
    histogram_buckets: [0.001, 0.0025, 0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5]
  mapping: |
    root = if ![
      "input_latency_ns",
      "processor_error",
      "processor_latency_ns",
      "output_error",
      "output_latency_ns",
    ].contains(this) { deleted() }

input:
  label: "mqtt_input"
  mqtt:
    urls: ["${MQTT_URL:tcp://emqx:1883}"]
    topics: ["device/+/telemetry"]
    qos: 0
    user: "${MQTT_USER}"
    password: "${MQTT_PASSWORD}"
    client_id: data-receiver
    clean_session: true
    connect_timeout: 10s
    auto_replay_nacks: true
    keepalive: 60

pipeline:
  processors:
    # 1. 提取上下文并标记可预期的非法输入，避免静默丢弃。
    - label: "extract_input_context"
      mapping: |
        meta mqtt_topic = metadata("mqtt_topic").or("")
        let parts = meta("mqtt_topic").split("/")
        let dev_id = $parts.1.or("")
        meta device_identifier = $dev_id
        meta validation_error = if $dev_id.length() == 0 {
          "mqtt topic missing device identifier"
        } else if this.type() != "object" {
          "payload must be an object"
        } else {
          deleted()
        }

    - label: "drop_invalid_messages"
      switch:
        - check: metadata("validation_error") != null
          processors:
            - label: "log_invalid_message"
              log:
                level: ERROR
                message: 'Dropping invalid telemetry message: topic=${!metadata("mqtt_topic")} dev_id=${!metadata("device_identifier")} reason=${!metadata("validation_error")}'
            - label: "delete_invalid_message"
              mapping: |
                root = deleted()

    # 2. 解析 topic 和 JSON 负载，生成属性明细数组。
    - label: "expand_telemetry_properties"
      mapping: |
        let t = metadata("mqtt_topic").or("//")
        let parts = $t.split("/")
        let dev_id = $parts.1.or("")
        let payload = this
        let received_at = now().ts_strftime("%Y-%m-%dT%H:%M:%S.%fZ", "UTC")
        # 优先使用 payload.ts 作为上报时间
        let time = if $payload.type() != "object" {
          $received_at
        } else if $payload.ts.type() == "number" {
          ($payload.ts / 1000.0).ts_strftime("%Y-%m-%dT%H:%M:%S.%fZ", "UTC")
        } else if $payload.ts.type() == "string" {
          $payload.ts.ts_strftime("%Y-%m-%dT%H:%M:%S.%fZ", "UTC")
        } else {
          $received_at
        }
        root = if $dev_id.length() == 0 || $payload.type() != "object" {
          deleted()
        } else {
          $payload.key_values().
            filter(item -> !["ts"].contains(item.key)).
            map_each(item -> {
              "time": $time,
              "device_identifier": $dev_id,
              "property_name": item.key,
              "value_type": if item.value.type() == "number" {
                "number"
              } else if item.value.type() == "string" {
                "string"
              } else if item.value.type() == "bool" {
                "bool"
              } else if ["array", "object"].contains(item.value.type()) {
                "json"
              } else {
                "null"
              },
              "value_number": if item.value.type() == "number" { item.value } else { null },
              "value_string": if item.value.type() == "string" { item.value } else { null },
              "value_bool": if item.value.type() == "bool" { item.value } else { null },
              "value_json": if ["array", "object"].contains(item.value.type()) { item.value } else { null },
              "received_at": $received_at
            })
        }

    - label: "handle_processing_errors"
      catch:
        - label: "log_processing_error"
          log:
            level: ERROR
            message: 'Telemetry processing failed: topic=${!metadata("mqtt_topic")} dev_id=${!metadata("device_identifier")} error=${!error()} source_label=${!error_source_label()} source_type=${!error_source_type()} source_path=${!error_source_path()}'
        - label: "delete_processing_error_message"
          mapping: |
            root = deleted()

output:
  label: "rabbitmq_output"
  amqp_0_9:
    urls: [${RABBITMQ_URL}]
    exchange: ${PROJECT_NAME}.${RABBITMQ_EXCHANGE}
    exchange_declare:
      enabled: true
      type: topic
      durable: true
    key: ${RABBITMQ_QUEUE_TYPE}
    persistent: true
    metadata:
      exclude_prefixes: []
